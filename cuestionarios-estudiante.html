<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Mis Cuestionarios - Cursos Virtual">
    <meta name="theme-color" content="#667eea">
    <title>Mis Cuestionarios - Cursos Virtual</title>

    <link rel="stylesheet" href="index.css">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .cuestionario-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 5px solid #667eea; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .cuestionario-card h3 { margin: 0 0 10px 0; color: #333; }
        .cuestionario-card p { margin: 5px 0; color: #666; font-size: 14px; }
        .badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin: 5px 5px 5px 0; }
        .badge-completado { background: #dcfce7; color: #166534; }
        .badge-disponible { background: #dbeafe; color: #1e40af; }
        .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(102, 126, 234, 0.4); }
        .btn-small { padding: 8px 12px; font-size: 13px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; overflow-y: auto; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto; }
        .close { float: right; font-size: 28px; cursor: pointer; color: #999; }
        .close:hover { color: #000; }
        .question { background: #f9f9f9; padding: 20px; margin: 20px 0; border-radius: 8px; border-left: 4px solid #667eea; }
        .question h4 { margin: 0 0 15px 0; }
        .question input[type="radio"], .question input[type="checkbox"], .question textarea { margin: 10px 0; }
        .option { padding: 10px; margin: 8px 0; background: white; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; }
        .option:hover { background: #f5f5f5; }
        .option input { margin-right: 8px; cursor: pointer; }
        .timer { font-size: 18px; font-weight: 600; color: #667eea; margin: 10px 0; }
        .timer.warning { color: #f59e0b; }
        .timer.danger { color: #ef4444; }
        .score-result { background: linear-gradient(135deg, #d1fae5 0%, #ecfdf5 100%); border-left: 4px solid #10b981; padding: 20px; border-radius: 8px; margin: 20px 0; text-align: center; }
        .score-result h3 { color: #10b981; margin: 0 0 10px 0; }
        .score-result .score { font-size: 36px; font-weight: 700; color: #10b981; margin: 10px 0; }
        .empty-state { text-align: center; padding: 40px 20px; color: #999; }
        .empty-state i { font-size: 48px; margin-bottom: 10px; }
    </style>
</head>

<body>
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2><i class="fas fa-question-circle"></i> Cuestionarios</h2>

        <ul>
            <li><a href="inicio-estudiante.html"><i class="fas fa-home"></i> Inicio</a></li>
            <li><a href="cursos-estudiante.html"><i class="fas fa-book"></i> Cursos</a></li>
            <li><a href="tareas-estudiante.html"><i class="fas fa-tasks"></i> Tareas</a></li>
            <li><a href="cuestionarios-estudiante.html" class="active"><i class="fas fa-question-circle"></i> Cuestionarios</a></li>
            <li><a href="perfil-estudiante.html"><i class="fas fa-user-circle"></i> Perfil</a></li>
        </ul>

        <button onclick="logout()" class="logout"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button>
    </aside>

    <!-- MAIN -->
    <main>
        <header>
            <h3><i class="fas fa-question-circle"></i> Mis Cuestionarios</h3>
        </header>

        <h2><i class="fas fa-clipboard-list"></i> Evaluaciones Disponibles</h2>
        <div id="cuestionariosDisponibles"></div>
    </main>

    <!-- MODAL PARA RESPONDER CUESTIONARIO -->
    <div id="modalCuestionario" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModalCuestionario()">&times;</span>
            <h2 id="cuestionarioTitulo"></h2>
            <p id="cursoInfo"></p>
            
            <div class="timer" id="timerDisplay"></div>
            
            <form id="formularioCuestionario"></form>
            
            <button class="btn btn-primary btn-small" onclick="enviarCuestionario()" style="width: 100%; padding: 12px; margin-top: 20px;">
                <i class="fas fa-paper-plane"></i> Enviar Respuestas
            </button>
        </div>
    </div>

    <!-- MODAL PARA VER RESULTADOS -->
    <div id="modalResultados" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModalResultados()">&times;</span>
            <h2>Resultados del Cuestionario</h2>
            <div id="resultadosContent"></div>
            <button class="btn btn-primary" onclick="cerrarModalResultados()" style="width: 100%; padding: 12px; margin-top: 20px;">
                Aceptar
            </button>
        </div>
    </div>

    <script>
        // ========== PROTECCIÓN ========== 
        if (localStorage.getItem("isLoggedIn") !== "true") {
            window.location.href = "index.html";
        }

        const nombreEstudiante = localStorage.getItem("userName") || "Estudiante";
        let cuestionarioActual = null;
        let tiempoRestante = 0;
        let timerInterval = null;
        let respuestasActuales = {};

        // ========== OBTENER CUESTIONARIOS DEL ESTUDIANTE ========== 
        function obtenerCuestionarios() {
            const cursos = JSON.parse(localStorage.getItem("cursos")) || [];
            const cuestionarios = JSON.parse(localStorage.getItem("cuestionarios")) || [];
            const inscripciones = JSON.parse(localStorage.getItem("inscripciones")) || [];
            const respuestas = JSON.parse(localStorage.getItem("respuestas")) || [];

            // Obtener cursos inscritos
            const cursosInscritos = inscripciones
                .filter(i => i.estudiante === nombreEstudiante)
                .map(i => i.cursoId);

            // Filtrar cuestionarios de cursos inscritos
            const misCuestionarios = cuestionarios.filter(c => cursosInscritos.includes(c.cursoId));

            return { cuestionarios: misCuestionarios, cursos, respuestas };
        }

        // ========== MOSTRAR CUESTIONARIOS DISPONIBLES ========== 
        function mostrarCuestionariosDisponibles() {
            const { cuestionarios, cursos, respuestas } = obtenerCuestionarios();

            let html = "";
            if (cuestionarios.length === 0) {
                html = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>No hay cuestionarios disponibles en tus cursos</p>
                    </div>
                `;
            } else {
                cuestionarios.forEach(cuestionario => {
                    const curso = cursos.find(c => c.id === cuestionario.cursoId);
                    const yaRespondi = respuestas.some(r => r.estudiante === nombreEstudiante && r.cuestionarioId === cuestionario.id);

                    if (yaRespondi) {
                        const resultado = respuestas.find(r => r.estudiante === nombreEstudiante && r.cuestionarioId === cuestionario.id);
                        html += `
                            <div class="cuestionario-card">
                                <h3>✅ ${cuestionario.nombre}</h3>
                                <p><strong>Curso:</strong> ${curso ? curso.nombre : 'N/A'}</p>
                                <p><strong>Preguntas:</strong> ${cuestionario.preguntas.length} | <strong>Puntos Totales:</strong> ${cuestionario.totalPuntos || cuestionario.preguntas.length}</p>
                                <p><strong>Tiempo Límite:</strong> ${cuestionario.tiempo} minutos</p>
                                <span class="badge badge-completado">✓ YA RESPONDIDO</span>
                                <div style="background: #f0fdf4; padding: 10px; border-radius: 6px; margin-top: 10px;">
                                    <p><strong>Tu Puntuación:</strong> <span style="font-size: 18px; color: #10b981;">${resultado.puntaje}/${resultado.totalPuntos}</span></p>
                                    <p>Porcentaje: <strong>${resultado.porcentaje || ((resultado.puntaje / resultado.totalPuntos) * 100).toFixed(1)}%</strong></p>
                                </div>
                                <button class="btn btn-small" onclick="verResultado(${cuestionario.id})" style="margin-top: 10px;">
                                    <i class="fas fa-eye"></i> Ver Detalles
                                </button>
                            </div>
                        `;
                    } else {
                        html += `
                            <div class="cuestionario-card">
                                <h3>❓ ${cuestionario.nombre}</h3>
                                <p><strong>Curso:</strong> ${curso ? curso.nombre : 'N/A'}</p>
                                <p><strong>Preguntas:</strong> ${cuestionario.preguntas.length} | <strong>Puntos Totales:</strong> ${cuestionario.totalPuntos || cuestionario.preguntas.length}</p>
                                <p><strong>Tiempo Límite:</strong> ${cuestionario.tiempo} minutos</p>
                                <span class="badge badge-disponible">📝 DISPONIBLE</span>
                                <button class="btn btn-primary" onclick="abrirCuestionario(${cuestionario.id})" style="margin-top: 10px;">
                                    <i class="fas fa-play-circle"></i> Iniciar Cuestionario
                                </button>
                            </div>
                        `;
                    }
                });
            }
            document.getElementById("cuestionariosDisponibles").innerHTML = html;
        }

        // ========== ABRIR CUESTIONARIO ========== 
        function abrirCuestionario(cuestionarioId) {
            const { cuestionarios, cursos } = obtenerCuestionarios();
            const cuestionario = cuestionarios.find(c => c.id === cuestionarioId);
            if (!cuestionario) return;

            const curso = cursos.find(c => c.id === cuestionario.cursoId);
            cuestionarioActual = cuestionario;
            respuestasActuales = {};
            tiempoRestante = cuestionario.tiempo * 60; // Convertir a segundos

            document.getElementById("cuestionarioTitulo").textContent = cuestionario.nombre;
            document.getElementById("cursoInfo").textContent = `📚 Curso: ${curso ? curso.nombre : 'N/A'}`;

            // Generar formulario
            let html = "";
            cuestionario.preguntas.forEach((pregunta, index) => {
                html += `<div class="question">
                    <h4>[Pregunta ${index + 1}] ${pregunta.texto}</h4>`;

                if (pregunta.tipo === 'opcion') {
                    html += '<div>';
                    pregunta.opciones.forEach((opcion, idx) => {
                        if (opcion) {
                            html += `
                                <div class="option">
                                    <input type="radio" name="pregunta_${index}" value="${opcion}" id="opt_${index}_${idx}" onchange="guardarRespuesta(${index}, this.value)">
                                    <label for="opt_${index}_${idx}" style="cursor: pointer; margin: 0;">${opcion}</label>
                                </div>
                            `;
                        }
                    });
                    html += '</div>';
                } else if (pregunta.tipo === 'verdadero') {
                    html += `
                        <div class="option">
                            <input type="radio" name="pregunta_${index}" value="Verdadero" id="vf_${index}_1" onchange="guardarRespuesta(${index}, this.value)">
                            <label for="vf_${index}_1" style="cursor: pointer; margin: 0;">Verdadero</label>
                        </div>
                        <div class="option">
                            <input type="radio" name="pregunta_${index}" value="Falso" id="vf_${index}_2" onchange="guardarRespuesta(${index}, this.value)">
                            <label for="vf_${index}_2" style="cursor: pointer; margin: 0;">Falso</label>
                        </div>
                    `;
                } else if (pregunta.tipo === 'corta') {
                    html += `<textarea name="pregunta_${index}" placeholder="Escribe tu respuesta aquí..." onchange="guardarRespuesta(${index}, this.value)"></textarea>`;
                }

                html += '</div>';
            });

            document.getElementById("formularioCuestionario").innerHTML = html;

            // Iniciar timer
            iniciarTimer();

            // Abrir modal
            document.getElementById("modalCuestionario").classList.add("active");
        }

        // ========== GUARDAR RESPUESTA ========== 
        function guardarRespuesta(index, valor) {
            respuestasActuales[index] = valor;
        }

        // ========== INICIAR TIMER ========== 
        function iniciarTimer() {
            let tiempoFormato = tiempoRestante;

            const actualizarTimer = () => {
                const minutos = Math.floor(tiempoFormato / 60);
                const segundos = tiempoFormato % 60;
                const texto = `⏱️ Tiempo restante: ${minutos}:${segundos.toString().padStart(2, '0')}`;

                let timerElement = document.getElementById("timerDisplay");
                timerElement.textContent = texto;

                if (tiempoFormato < 300) {
                    timerElement.classList.add("warning");
                }
                if (tiempoFormato < 60) {
                    timerElement.classList.add("danger");
                }

                if (tiempoFormato <= 0) {
                    clearInterval(timerInterval);
                    enviarCuestionario();
                }

                tiempoFormato--;
            };

            actualizarTimer();
            timerInterval = setInterval(actualizarTimer, 1000);
        }

        // ========== ENVIAR CUESTIONARIO ========== 
        function enviarCuestionario() {
            if (timerInterval) clearInterval(timerInterval);

            let puntaje = 0;
            let totalPuntos = 0;

            // Calcular puntos dinámicos basado en pregunta.puntos
            cuestionarioActual.preguntas.forEach((pregunta, index) => {
                totalPuntos += (pregunta.puntos || 1);
                const respuesta = respuestasActuales[index];
                if (respuesta && respuesta.toLowerCase() === pregunta.respuesta.toLowerCase()) {
                    puntaje += (pregunta.puntos || 1);
                }
            });

            // Guardar resultado
            let respuestas = JSON.parse(localStorage.getItem("respuestas")) || [];
            respuestas.push({
                estudiante: nombreEstudiante,
                cuestionarioId: cuestionarioActual.id,
                puntaje: puntaje,
                totalPuntos: totalPuntos,
                porcentaje: ((puntaje / totalPuntos) * 100).toFixed(1),
                fecha: new Date().toLocaleDateString('es-ES'),
                hora: new Date().toLocaleTimeString('es-ES')
            });
            localStorage.setItem("respuestas", JSON.stringify(respuestas));

            // Mostrar resultado
            mostrarResultado(puntaje, totalPuntos);

            // Cerrar modal
            cerrarModalCuestionario();
            mostrarCuestionariosDisponibles();
        }

        // ========== MOSTRAR RESULTADO ========== 
        function mostrarResultado(puntaje, total) {
            const porcentaje = ((puntaje / total) * 100).toFixed(1);
            const estado = porcentaje >= 60 ? "APROBADO ✅" : "NO APROBADO ❌";

            let html = `
                <div class="score-result">
                    <h3>Evaluación Completada</h3>
                    <div class="score">${puntaje}/${total}</div>
                    <p><strong>Porcentaje:</strong> ${porcentaje}%</p>
                    <p style="font-size: 18px; margin-top: 15px; ${porcentaje >= 60 ? 'color: #10b981;' : 'color: #ef4444;'} font-weight: 600;">
                        ${estado}
                    </p>
                </div>
            `;

            document.getElementById("resultadosContent").innerHTML = html;
            document.getElementById("modalResultados").classList.add("active");
        }

        // ========== VER RESULTADO GUARDADO ========== 
        function verResultado(cuestionarioId) {
            const respuestas = JSON.parse(localStorage.getItem("respuestas")) || [];
            const resultado = respuestas.find(r => r.estudiante === nombreEstudiante && r.cuestionarioId === cuestionarioId);

            if (resultado) {
                let html = `
                    <div class="score-result">
                        <h3>Tu Puntuación</h3>
                        <div class="score">${resultado.puntaje}/${resultado.totalPuntos}</div>
                        <p><strong>Porcentaje:</strong> ${resultado.porcentaje}%</p>
                        <p><strong>Fecha:</strong> ${resultado.fecha} - ${resultado.hora}</p>
                        <p style="font-size: 16px; margin-top: 15px; ${resultado.porcentaje >= 60 ? 'color: #10b981;' : 'color: #ef4444;'} font-weight: 600;">
                            ${resultado.porcentaje >= 60 ? 'APROBADO ✅' : 'NO APROBADO ❌'}
                        </p>
                    </div>
                `;
                document.getElementById("resultadosContent").innerHTML = html;
                document.getElementById("modalResultados").classList.add("active");
            }
        }

        // ========== CERRAR MODALES ========== 
        function cerrarModalCuestionario() {
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById("modalCuestionario").classList.remove("active");
        }

        function cerrarModalResultados() {
            document.getElementById("modalResultados").classList.remove("active");
        }

        // ========== LOGOUT ========== 
        function logout() {
            if (confirm("¿Cerrar sesión?")) {
                localStorage.removeItem("isLoggedIn");
                localStorage.removeItem("userName");
                localStorage.removeItem("userEmail");
                localStorage.removeItem("userRole");
                window.location.href = "index.html";
            }
        }

        // CARGAR AL INICIO
        mostrarCuestionariosDisponibles();
        document.querySelectorAll('.sidebar a').forEach(link => {
            if (link.href === window.location.href) {
                link.classList.add('active');
            }
        });
    </script>
</body>
</html>
